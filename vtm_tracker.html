<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0905">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VtM Tracker">
<title>VtM Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blood:#8B0000;--blood2:#b22222;--blood3:#c0392b;
  --ink:#0d0905;--surf:#161008;--card:#1e1510;--card2:#261a10;
  --br:#3a2a1a;--br2:#5a3a20;
  --gd:#c9a84c;--gd2:#7a6030;
  --tx:#e8d9c0;--tx2:#8a7a65;--tx3:#5a4a35;
  --gr:#2d7a32;--gr2:#3a8a3e;
  --wp:#3a6aaa;--wp2:#4a7acc;
  --ba:#7a5a00;--le:#8B0000;--ag:#333;
}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--ink);font-family:'Crimson Text',serif;color:var(--tx);
  display:flex;flex-direction:column;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(139,0,0,.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(139,0,0,.06) 0%, transparent 60%);
}

/* HEADER */
.hdr{
  background:var(--surf);border-bottom:1.5px solid var(--blood);
  padding:10px 16px 8px;flex-shrink:0;
  display:flex;align-items:center;gap:10px;
}
.hdr-icon{
  width:28px;height:28px;border-radius:50%;background:rgba(139,0,0,.25);
  border:1px solid var(--blood);display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
}
.hdr-name{
  font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gd);
  background:transparent;border:none;outline:none;flex:1;letter-spacing:1px;
  min-width:0;
}
.hdr-name::placeholder{color:var(--tx3);}
.hdr-badge{
  font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;
  color:var(--tx3);border:1px solid var(--br);padding:3px 7px;border-radius:2px;
  white-space:nowrap;flex-shrink:0;
}

/* SCROLLABLE CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 14px 24px;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:var(--br2);}

/* SECTION */
.sec{
  background:var(--surf);border:1px solid var(--br);border-radius:3px;
  overflow:hidden;margin-bottom:12px;
}
.sec-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 14px;background:var(--card);border-bottom:1px solid var(--br);
}
.sec-title{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--gd2);
}
.sec-val{
  font-family:'Cinzel',serif;font-size:12px;font-weight:700;
}
.sec-body{padding:12px 14px;}

/* SANGUE */
.blood-dots{
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;
}
.bdot{
  width:22px;height:22px;border-radius:50%;border:1.5px solid var(--blood);
  cursor:pointer;transition:transform .1s,background .1s;
  -webkit-tap-highlight-color:transparent;
}
.bdot.on{background:var(--blood);box-shadow:0 0 6px rgba(139,0,0,.5);}
.bdot:active{transform:scale(.85);}

.ctrl-row{display:flex;gap:8px;align-items:center;}
.ctrl-btn{
  flex:1;padding:12px 0;border:none;border-radius:3px;cursor:pointer;
  font-family:'Cinzel',serif;font-size:18px;font-weight:700;
  transition:all .1s;-webkit-tap-highlight-color:transparent;
}
.ctrl-btn:active{transform:scale(.94);}
.ctrl-btn.minus{background:rgba(139,0,0,.25);color:#f99;border:1px solid rgba(139,0,0,.5);}
.ctrl-btn.minus:active{background:rgba(139,0,0,.5);}
.ctrl-btn.plus{background:rgba(58,138,62,.2);color:#8d8;border:1px solid rgba(58,138,62,.4);}
.ctrl-btn.plus:active{background:rgba(58,138,62,.4);}
.ctrl-mid{
  text-align:center;min-width:52px;
  font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--gd);
}
.ctrl-sub{font-size:10px;color:var(--tx3);display:block;margin-top:-2px;}

/* MAX EDITOR */
.max-row{
  display:flex;align-items:center;gap:6px;margin-top:10px;
  padding-top:10px;border-top:1px solid rgba(58,42,26,.4);
}
.max-lbl{font-size:11px;color:var(--tx3);flex:1;font-family:'Cinzel',serif;letter-spacing:1px;}
.max-btn{
  width:26px;height:26px;border-radius:2px;border:1px solid var(--br2);
  background:transparent;color:var(--tx2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.max-btn:active{background:var(--card2);}
.max-val{
  font-family:'Cinzel',serif;font-size:13px;color:var(--tx);
  min-width:20px;text-align:center;
}

/* VITALIDADE */
.health-list{display:flex;flex-direction:column;gap:4px;}
.h-row{
  display:flex;align-items:center;gap:10px;
  padding:6px 0;border-bottom:1px dotted rgba(58,42,26,.3);
}
.h-row:last-child{border-bottom:none;}
.h-lbl{flex:1;font-size:14px;color:var(--tx);}
.h-pen{
  font-family:'Cinzel',serif;font-size:10px;color:var(--blood2);
  width:22px;text-align:right;flex-shrink:0;
}
.h-box{
  width:32px;height:32px;border:1.5px solid var(--br2);border-radius:3px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;transition:all .1s;
  -webkit-tap-highlight-color:transparent;
}
.h-box:active{transform:scale(.88);}
.h-box.ba{background:var(--ba);border-color:#a07800;color:#ffd070;}
.h-box.le{background:var(--le);border-color:var(--blood2);color:#fcc;}
.h-box.ag{background:#111;border-color:#666;color:#f44;}

/* STATUS BADGE */
.status-bar{
  background:var(--card);border-top:1px solid var(--br);
  padding:6px 14px;text-align:center;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  transition:color .3s;
}

/* FDV */
.fdv-perm{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.fdv-dot{
  width:14px;height:14px;border-radius:50%;border:1.5px solid var(--wp);
}
.fdv-dot.on{background:var(--wp);}
.fdv-temp{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;}
.fdv-box{
  width:18px;height:10px;border:1.5px solid var(--wp);border-radius:1px;cursor:pointer;
  transition:background .1s;-webkit-tap-highlight-color:transparent;
}
.fdv-box.on{background:var(--wp);}
.fdv-box:active{opacity:.6;}

/* DANO RAPIDO */
.dano-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:6px;}
.dano-btn{
  padding:14px 4px;border-radius:3px;border:1px solid;cursor:pointer;
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;
  text-align:center;transition:all .1s;-webkit-tap-highlight-color:transparent;
}
.dano-btn:active{transform:scale(.93);}
.dano-btn.ba{background:rgba(122,90,0,.2);border-color:rgba(160,120,0,.5);color:#ffd070;}
.dano-btn.ba:active{background:rgba(122,90,0,.4);}
.dano-btn.le{background:rgba(139,0,0,.2);border-color:rgba(178,34,34,.5);color:#f99;}
.dano-btn.le:active{background:rgba(139,0,0,.4);}
.dano-btn.ag{background:rgba(40,10,10,.6);border-color:#555;color:#f44;}
.dano-btn.ag:active{background:rgba(40,10,10,.9);}
.dano-sub{font-size:10px;display:block;margin-top:2px;opacity:.7;}

/* CURAR */
.cure-btn{
  width:100%;padding:10px;border-radius:3px;background:rgba(45,122,50,.15);
  border:1px solid rgba(58,138,62,.4);color:#8d8;
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:all .1s;-webkit-tap-highlight-color:transparent;
}
.cure-btn:active{background:rgba(45,122,50,.35);transform:scale(.98);}

/* RESET */
.reset-btn{
  width:100%;padding:8px;border-radius:3px;background:transparent;
  border:1px solid var(--br2);color:var(--tx3);
  font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;margin-top:12px;transition:all .1s;
}
.reset-btn:active{border-color:var(--blood);color:#f88;}

/* LEGEND */
.legend{
  display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;
  font-size:10px;color:var(--tx3);
}
.leg-item{display:flex;align-items:center;gap:4px;}
.leg-dot{width:9px;height:9px;border-radius:1px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">🩸</div>
  <input class="hdr-name" id="charName" placeholder="Nome do personagem" spellcheck="false"/>
  <div class="hdr-badge" id="statusBadge">Ileso</div>
</div>

<div class="content">

  <!-- SANGUE -->
  <div class="sec">
    <div class="sec-hd">
      <span class="sec-title">⬥ Sangue</span>
      <span class="sec-val" id="bloodLabel" style="color:#f88;">—</span>
    </div>
    <div class="sec-body">
      <div class="blood-dots" id="bloodDots"></div>
      <div class="ctrl-row">
        <button class="ctrl-btn minus" onclick="changeBlood(-1)">−</button>
        <div class="ctrl-mid">
          <span id="bloodCur">10</span>
          <span class="ctrl-sub" id="bloodMax2">/ 10</span>
        </div>
        <button class="ctrl-btn plus" onclick="changeBlood(1)">+</button>
      </div>
      <div class="max-row">
        <span class="max-lbl">Máx</span>
        <button class="max-btn" onclick="changeBloodMax(-1)">−</button>
        <span class="max-val" id="bloodMaxVal">10</span>
        <button class="max-btn" onclick="changeBloodMax(1)">+</button>
      </div>
    </div>
  </div>

  <!-- VITALIDADE + DANO RAPIDO -->
  <div class="sec">
    <div class="sec-hd">
      <span class="sec-title">⬥ Vitalidade</span>
      <span class="sec-val" id="healthLabel" style="font-size:10px;color:var(--tx2);">Ileso</span>
    </div>
    <div class="sec-body">
      <div class="health-list" id="healthList"></div>
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:#7a5a00;"></div>Contusão</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--blood);"></div>Letal</div>
        <div class="leg-item"><div class="leg-dot" style="background:#333;border:1px solid #666;"></div>Agravado</div>
      </div>
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(58,42,26,.3);">
        <div style="font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;color:var(--tx3);text-transform:uppercase;margin-bottom:8px;">Aplicar dano</div>
        <div class="dano-grid">
          <button class="dano-btn ba" onclick="applyDamage('b')">Contusão<span class="dano-sub">1 caixa</span></button>
          <button class="dano-btn le" onclick="applyDamage('l')">Letal<span class="dano-sub">1 caixa</span></button>
          <button class="dano-btn ag" onclick="applyDamage('a')">Agravado<span class="dano-sub">1 caixa</span></button>
        </div>
        <button class="cure-btn" onclick="healOne()">✦ Curar 1 caixa</button>
      </div>
    </div>
  </div>

  <!-- FORÇA DE VONTADE -->
  <div class="sec">
    <div class="sec-hd">
      <span class="sec-title">⬥ Força de Vontade</span>
      <span class="sec-val" id="wpLabel" style="color:#8af;">—</span>
    </div>
    <div class="sec-body">
      <div style="font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;color:var(--tx3);text-transform:uppercase;margin-bottom:5px;">Permanente</div>
      <div class="fdv-perm" id="fdvPerm"></div>
      <div style="font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;color:var(--tx3);text-transform:uppercase;margin-bottom:5px;">Temporária</div>
      <div class="fdv-temp" id="fdvTemp"></div>
      <div class="ctrl-row">
        <button class="ctrl-btn minus" onclick="changeWP(-1)">−</button>
        <div class="ctrl-mid">
          <span id="wpCur">5</span>
          <span class="ctrl-sub" id="wpMax2">/ 5</span>
        </div>
        <button class="ctrl-btn plus" onclick="changeWP(1)">+</button>
      </div>
      <div class="max-row">
        <span class="max-lbl">Máx</span>
        <button class="max-btn" onclick="changeWPMax(-1)">−</button>
        <span class="max-val" id="wpMaxVal">5</span>
        <button class="max-btn" onclick="changeWPMax(1)">+</button>
      </div>
    </div>
  </div>

  <button class="reset-btn" onclick="confirmReset()">↺ Resetar todos os recursos para o máximo</button>

</div>

<div class="status-bar" id="statusBar" style="color:var(--gr2);">● Ileso — pronto para a noite</div>

<script>
const HL=[
  {l:'Escoriado',p:'—'},{l:'Machucado',p:'-1'},{l:'Ferido',p:'-1'},
  {l:'Ferido Grav.',p:'-2'},{l:'Espancado',p:'-2'},{l:'Aleijado',p:'-5'},{l:'Incapacitado',p:'Inc'}
];

let S={
  name:'',
  bloodCur:10,bloodMax:10,
  health:[null,null,null,null,null,null,null],
  wpCur:5,wpMax:5
};

function save(){try{localStorage.setItem('vtm_tracker',JSON.stringify(S));}catch(e){}}
function load(){try{const d=localStorage.getItem('vtm_tracker');if(d)S=Object.assign(S,JSON.parse(d));}catch(e){}}

// SANGUE
function changeBlood(n){
  S.bloodCur=Math.max(0,Math.min(S.bloodMax,S.bloodCur+n));
  renderBlood();save();updateStatus();
}
function changeBloodMax(n){
  S.bloodMax=Math.max(1,Math.min(30,S.bloodMax+n));
  S.bloodCur=Math.min(S.bloodCur,S.bloodMax);
  renderBlood();save();
}
function renderBlood(){
  const el=document.getElementById('bloodDots');el.innerHTML='';
  for(let i=0;i<S.bloodMax;i++){
    const d=document.createElement('div');d.className='bdot'+(i<S.bloodCur?' on':'');
    d.onclick=()=>i<S.bloodCur?changeBlood(-1):changeBlood(1);
    el.appendChild(d);
  }
  document.getElementById('bloodCur').textContent=S.bloodCur;
  document.getElementById('bloodMax2').textContent='/ '+S.bloodMax;
  document.getElementById('bloodMaxVal').textContent=S.bloodMax;
  document.getElementById('bloodLabel').textContent=S.bloodCur+'/'+S.bloodMax;
}

// VITALIDADE
function applyDamage(type){
  // Tenta aplicar na primeira caixa disponível
  // Agravado: upgrade qualquer
  // Letal: substitui contusão ou preenche vazia
  // Contusão: preenche vazia
  if(type==='a'){
    // Primeiro tenta upgrade letal → agravado
    let idx=S.health.findIndex(h=>h==='l');
    if(idx===-1) idx=S.health.findIndex(h=>h==='b');
    if(idx===-1) idx=S.health.findIndex(h=>h===null);
    if(idx!==-1){S.health[idx]='a';renderHealth();save();updateStatus();}
    else vibrate();
  }else if(type==='l'){
    let idx=S.health.findIndex(h=>h==='b');
    if(idx===-1) idx=S.health.findIndex(h=>h===null);
    if(idx!==-1){S.health[idx]='l';renderHealth();save();updateStatus();}
    else vibrate();
  }else{
    let idx=S.health.findIndex(h=>h===null);
    if(idx!==-1){S.health[idx]='b';renderHealth();save();updateStatus();}
    else vibrate();
  }
}
function healOne(){
  // Cura do menos grave para o mais grave
  let idx=S.health.map((h,i)=>({h,i})).reverse().find(x=>x.h!==null);
  if(idx){S.health[idx.i]=null;renderHealth();save();updateStatus();}
}
function cycleBox(i){
  const c={null:'b',b:'l',l:'a',a:null};
  S.health[i]=c[String(S.health[i])];
  renderHealth();save();updateStatus();
}
function renderHealth(){
  const el=document.getElementById('healthList');el.innerHTML='';
  const w=S.health.findIndex(h=>h!==null);
  HL.forEach((h,i)=>{
    const dmg=S.health[i];
    const cls=dmg==='b'?'ba':dmg==='l'?'le':dmg==='a'?'ag':'';
    const ch=dmg==='b'?'/':dmg==='l'?'✕':dmg==='a'?'*':'';
    const row=document.createElement('div');row.className='h-row';
    row.innerHTML=`<div class="h-lbl">${h.l}</div><div class="h-pen">${h.p}</div><div class="h-box${cls?' '+cls:''}" onclick="cycleBox(${i})" style="color:${cls?'inherit':'transparent'}">${ch}</div>`;
    el.appendChild(row);
  });
  const labels=['Escoriado','Machucado','Ferido','Ferido Grav.','Espancado','Aleijado','INCAPACITADO'];
  const hl=document.getElementById('healthLabel');
  if(w===-1){hl.textContent='Ileso';hl.style.color='var(--gr2)';}
  else if(w>=6){hl.textContent='INCAPACITADO';hl.style.color='#f44';}
  else{hl.textContent=labels[w];hl.style.color=w>4?'#f44':w>2?'#fa5':'var(--tx2)';}
}

// FORÇA DE VONTADE
function changeWP(n){
  S.wpCur=Math.max(0,Math.min(S.wpMax,S.wpCur+n));
  renderWP();save();updateStatus();
}
function changeWPMax(n){
  S.wpMax=Math.max(1,Math.min(10,S.wpMax+n));
  S.wpCur=Math.min(S.wpCur,S.wpMax);
  renderWP();save();
}
function renderWP(){
  const pe=document.getElementById('fdvPerm');pe.innerHTML='';
  for(let i=0;i<S.wpMax;i++){
    const d=document.createElement('div');d.className='fdv-dot'+(i<S.wpMax?' on':'');
    d.style.opacity=i<S.wpMax?'1':'0.2';pe.appendChild(d);
  }
  const te=document.getElementById('fdvTemp');te.innerHTML='';
  for(let i=0;i<S.wpMax;i++){
    const d=document.createElement('div');d.className='fdv-box'+(i<S.wpCur?' on':'');
    d.onclick=()=>i<S.wpCur?changeWP(-1):changeWP(1);
    te.appendChild(d);
  }
  document.getElementById('wpCur').textContent=S.wpCur;
  document.getElementById('wpMax2').textContent='/ '+S.wpMax;
  document.getElementById('wpMaxVal').textContent=S.wpMax;
  document.getElementById('wpLabel').textContent=S.wpCur+'/'+S.wpMax;
}

// STATUS GERAL
function updateStatus(){
  const w=S.health.findIndex(h=>h!==null);
  const bar=document.getElementById('statusBar');
  const badge=document.getElementById('statusBadge');
  const pct=S.bloodCur/S.bloodMax;

  let healthTxt,healthColor;
  if(w===-1){healthTxt='Ileso';healthColor='var(--gr2)';}
  else if(w>=6){healthTxt='INCAPACITADO';healthColor='#f44';}
  else{
    const l=['Escoriado','Machucado','Ferido','Ferido Grav.','Espancado','Aleijado','INCAPACITADO'];
    healthTxt=l[w];healthColor=w>4?'#f44':w>2?'#fa5':'var(--tx2)';
  }

  let bloodTxt='';
  if(pct===0)bloodTxt=' · 💀 Sem sangue!';
  else if(pct<0.2)bloodTxt=' · 🩸 Crítico';
  else if(pct<0.4)bloodTxt=' · Sangue baixo';

  let wpTxt='';
  if(S.wpCur===0)wpTxt=' · FdV esgotada';

  bar.textContent='● '+healthTxt+bloodTxt+wpTxt;
  bar.style.color=healthColor;
  badge.textContent=healthTxt;
  badge.style.color=healthColor;
}

function confirmReset(){
  if(confirm('Resetar sangue e FdV para o máximo? Vitalidade permanece.')){
    S.bloodCur=S.bloodMax;S.wpCur=S.wpMax;
    renderBlood();renderWP();updateStatus();save();
  }
}

function vibrate(){if(navigator.vibrate)navigator.vibrate(80);}

// NOME
document.getElementById('charName').addEventListener('input',function(){
  S.name=this.value;save();document.title=(this.value||'VtM')+' Tracker';
});

// INIT
load();
document.getElementById('charName').value=S.name||'';
if(S.name)document.title=S.name+' Tracker';
renderBlood();renderHealth();renderWP();updateStatus();

// PWA SERVICE WORKER (instalável no celular)
if('serviceWorker' in navigator){
  const sw=`
    const CACHE='vtm-tracker-v1';
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.add('/'))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));
  `;
  const blob=new Blob([sw],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>

<!-- PWA Manifest inline -->
<script>
const manifest={
  name:'VtM Combat Tracker',short_name:'VtM Tracker',
  start_url:'.',display:'standalone',
  background_color:'#0d0905',theme_color:'#0d0905',
  description:'Tracker de combate para Vampiro: A Máscara',
  icons:[{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%230d0905"/><text y=".9em" font-size="90">🩸</text></svg>',sizes:'any',type:'image/svg+xml'}]
};
const mblob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
